<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>💜 BTS Weekly Planner</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🧸 BT21 STICKERS -->
<img src="https://i.pinimg.com/originals/0d/9d/5e/0d9d5e6f4e1f3d2b7c8a9e1d2f3b4c5a.png" class="sticker s1">
<img src="https://i.pinimg.com/originals/6e/0b/6f/6e0b6f8c9c9d4c1f7c8b2a6b6d7e9b3c.png" class="sticker s2">
<img src="https://i.pinimg.com/originals/3a/3c/5e/3a3c5e8b4d9c6b7a8f5e9d3c1b2a7c4d.png" class="sticker s3">

<div class="container">

  <h1>💜 My BTS Weekly Planner</h1>
  <p>✨ Korea Dream 🇰🇷 | I will achieve it 💜</p>

  <!-- WEEK -->
  <div class="week">

    <div class="day">
      <h3>Monday</h3>
      <textarea id="mon"></textarea>
    </div>

    <div class="day">
      <h3>Tuesday</h3>
      <textarea id="tue"></textarea>
    </div>

    <div class="day">
      <h3>Wednesday</h3>
      <textarea id="wed"></textarea>
    </div>

    <div class="day">
      <h3>Thursday</h3>
      <textarea id="thu"></textarea>
    </div>

    <div class="day">
      <h3>Friday</h3>
      <textarea id="fri"></textarea>
    </div>

    <div class="day">
      <h3>Saturday</h3>
      <textarea id="sat"></textarea>
    </div>

    <div class="day">
      <h3>Sunday</h3>
      <textarea id="sun"></textarea>
    </div>

  </div>

  <!-- DREAM -->
  <h3>🎯 My Dream</h3>
  <textarea id="dream">I will go to Korea 🇰🇷💜</textarea>

  <!-- MOTIVATION -->
  <h3>💜 BTS Motivation</h3>
  <div id="motivation"></div>

  <button onclick="saveData()">💾 Save</button>

</div>

<script src="script.js"></script>
</body>
</html>
